url: https://strategicprojects.github.io/obrasgovr/

template:
  bootstrap: 5
  bootswatch: flatly
  bslib:
    primary: "#1351B4"
    base_font: system-ui
    heading_font: system-ui
    code_font: monospace

lang: en

home:
  title: obrasgovr | Brazilian public infrastructure data in R
  description: >
    R interface to projects, physical execution, contracts, commitments, and
    geometries from the ObrasGov Open Data API.

navbar:
  structure:
    left: [intro, reference, articles, news]
    right: [search, github]
  components:
    intro:
      text: Get started
      href: articles/obrasgovr.html
    reference:
      text: Reference
      href: reference/index.html
    articles:
      text: Articles
      menu:
      - text: End-to-end workflow
        href: articles/end-to-end-workflow.html
      - text: Pagination and nested data
        href: articles/pagination-and-nested-data.html
    news:
      text: News
      href: news/index.html
    github:
      icon: fab fa-github
      aria-label: GitHub
      href: https://github.com/StrategicProjects/obrasgovr

reference:
- title: Queries
  desc: Resources from the ObrasGov Open Data API.
  contents:
  - get_projects
  - get_physical_execution
  - get_contracts
  - get_commitments
  - get_geometries
  - get_status_history
  - get_feasibility_studies
  - get_last_update
- title: Discovery and metadata
  contents:
  - list_resources
  - list_filters
  - result_metadata
- title: Portuguese aliases
  desc: Compatibility aliases with Portuguese names and pagination arguments.
  contents:
  - obter_projetos
  - obter_execucao_fisica
  - obter_contratos
  - obter_empenhos
  - obter_geometrias
  - obter_historico_situacao
  - obter_estudos_viabilidade
  - obter_data_atualizacao
  - obrasgov_recursos
  - obrasgov_filtros
  - obrasgov_metadados

articles:
- title: Guides
  contents:
  - obrasgovr
  - end-to-end-workflow
  - pagination-and-nested-data

footer:
  structure:
    left: developed_by
    right: built_with
