url: https://strategicprojects.github.io/obrasgov/

template:
  bootstrap: 5
  bootswatch: flatly
  bslib:
    primary: "#1351B4"
    base_font: system-ui
    heading_font: system-ui
    code_font: monospace

lang: pt

home:
  title: obrasgov | Dados abertos de infraestrutura publica no R
  description: >
    Interface R para projetos, execucao fisica, contratos, empenhos e
    geometrias da API de Dados Abertos do ObrasGov.

navbar:
  structure:
    left: [intro, reference, articles, news]
    right: [search, github]
  components:
    intro:
      text: Comece aqui
      href: articles/obrasgov.html
    reference:
      text: Referencia
      href: reference/index.html
    articles:
      text: Artigos
      menu:
      - text: Paginacao e dados aninhados
        href: articles/paginacao-e-dados-aninhados.html
    news:
      text: Novidades
      href: news/index.html
    github:
      icon: fab fa-github
      aria-label: GitHub
      href: https://github.com/StrategicProjects/obrasgov

